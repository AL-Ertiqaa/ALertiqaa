name: Daily Backup to Gist
on:
  schedule:
    - cron: '0 2 * * *'  # يومياً 2 صباحاً UTC
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g firebase-tools
      - name: Fetch all students and create backup
        run: |
          node -e "
            const { initializeApp } = require('firebase/app');
            const { getFirestore, collection, query, where, getDocs, orderBy, limit, startAfter } = require('firebase/firestore');
            
            const firebaseConfig = {
              apiKey: 'AIzaSyBPk7T-rD_DffpMP13ra7Q_gkOBy8Nqi5s',
              authDomain: 'alertiqaa.firebaseapp.com',
              projectId: 'alertiqaa',
              messagingSenderId: '118590328758',
              appId: '1:118590328758:web:2ac3aa05f9c364eb78fb17'
            };
            
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            
            async function fetchAll() {
              let allDocs = [];
              let lastDoc = null;
              const BATCH_SIZE = 100;
              let hasMore = true;
              
              while (hasMore) {
                let q = query(collection(db, 'students'), where('deleted', '==', false), orderBy('registeredAt', 'desc'), limit(BATCH_SIZE));
                if (lastDoc) q = query(q, startAfter(lastDoc));
                const snapshot = await getDocs(q);
                const docs = snapshot.docs;
                if (docs.length === 0) { hasMore = false; break; }
                docs.forEach(d => allDocs.push({ id: d.id, ...d.data() }));
                lastDoc = docs[docs.length - 1];
                if (docs.length < BATCH_SIZE) hasMore = false;
              }
              return allDocs;
            }
            
            fetchAll().then(students => {
              const backup = {
                exportDate: new Date().toISOString(),
                school: 'مدارس الأرتقاء الأهلية',
                totalStudents: students.length,
                students: students
              };
              require('fs').writeFileSync('backup.json', JSON.stringify(backup, null, 2));
              console.log('Backup created:', students.length, 'students');
            }).catch(e => { console.error(e); process.exit(1); });
          "
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      - name: Create/Update Gist
        uses: actions/create-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ secrets.GIST_ID }}
          files: "backup_${{ github.run_id }}.json=backup.json"
          public: false
          description: "Auto backup - مدارس الأرتقاء الأهلية - ${{ github.run_id }}"